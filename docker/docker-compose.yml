version: '3.8'

services:
  eureka-server:
    build:
      # Esse trecho é combinado com o COPY do dockerfile = ..server/target/*.jar
      context: ../eureka-server
      dockerfile: ../docker/java-Dockerfile
    container_name: easy-video-eureka
    ports:
      - "8761:8761"
    env_file:
      - ../variaveis/compose/.env.eureka.compose
    networks:
      - easy-video
    restart: unless-stopped

  gateway:
    build:
      context: ../gateway
      dockerfile: ../docker/java-Dockerfile
    container_name: easy-video-gateway
    ports:
      - "8082:8082"
    env_file:
      - ../variaveis/compose/.env.gateway.compose
    networks:
      - easy-video
    restart: unless-stopped
    depends_on:
      eureka-server: 
        condition: service_healthy 

  orquestrador:
    build:
      context: ../orquestrador
      dockerfile: ../docker/java-Dockerfile
    container_name: easy-video-orquestrador
    ports:
      - "8083:8083"
    env_file:
      - ../variaveis/compose/.env.orquestrador.compose
    networks:
      - easy-video
    restart: unless-stopped
    depends_on:
      eureka-server: 
        condition: service_healthy 
      rabbitmq: 
        condition: service_healthy

  midia-extrator:
    build:
      context: ../midia-extrator
      dockerfile: ../docker/java-Dockerfile
    container_name: easy-video-midia-extrator
    ports:
      - "8084:8084"
    env_file:
      - ../variaveis/compose/.env.midia-extrator.compose
    networks:
      - easy-video
    restart: unless-stopped
    depends_on:
      eureka-server: 
        condition: service_healthy 
      rabbitmq: 
        condition: service_healthy

  rabbitmq:
    build:
      context: .
      dockerfile: ../docker/rabbitmq-Dockerfile
    container_name: easy-video-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - ../variaveis/compose/.env.rabbitmq.compose
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq     # Usando volume para persistência
    networks:
      - easy-video
    restart: unless-stopped


  grafana:
    build:
      context: .
      dockerfile: ../docker/grafana-Dockerfile
    container_name: easy-video-grafana
    ports:
      - "3000:3000"
    env_file:
      - ../variaveis/compose/.env.grafana.compose 
    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_log:/var/log/grafana
    restart: unless-stopped

volumes:
  rabbitmq_data:    # Declarando o volume para persistência
    driver: local   # Driver padrão do Docker para volumes
  grafana_data:
    driver: local
  grafana_log:
    driver: local
  
networks:
  easy-video:
    driver: bridge
 


