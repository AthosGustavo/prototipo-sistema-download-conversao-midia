version: '3.8'

services:
  eureka-server:
    build:
      # Esse trecho é combinado com o COPY do dockerfile = ..server/target/*.jar
      context: ../eureka-server
      dockerfile: ../docker/eureka-Dockerfile
    container_name: midia-converte-eureka
    ports:
      - "8081:8761"
    env_file:
      - ../variaveis/compose/.env.eureka.compose
    networks:
      - midia-converte
    restart: unless-stopped

  gateway:
    build:
      context: ../gateway
      dockerfile: ../docker/gateway-Dockerfile
    container_name: midia-converte-gateway
    ports:
      - "8082:8082"
    env_file:
      - ../variaveis/compose/.env.gateway.compose
    networks:
      - midia-converte
    restart: unless-stopped
    depends_on:
      - eureka-server

  orquestrador:
    build:
      context: ../orquestrador
      dockerfile: ../docker/orquestrador-Dockerfile
    container_name: midia-converte-orquestrador
    ports:
      - "8083:8083"
    env_file:
      - ../variaveis/compose/.env.orquestrador.compose
    networks:
      - midia-converte
    restart: unless-stopped
    depends_on:
      - eureka-server

  download:
    build:
      context: ../download
      dockerfile: ../docker/download-Dockerfile
    container_name: midia-converte-download
    ports:
      - "8084:8084"
    env_file:
      - ../variaveis/compose/.env.download.compose
    networks:
      - midia-converte
    restart: unless-stopped
    depends_on:
      - eureka-server

  rabbitmq:
    build:
      context: .
      dockerfile: ../docker/rabbitmq-Dockerfile
    container_name: midia-converte-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - ../variaveis/compose/.env.rabbitmq.compose
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq     # Usando volume para persistência
    networks:
      - midia-converte
    restart: unless-stopped

volumes:
  rabbitmq_data:    # Declarando o volume para persistência
    driver: local   # Driver padrão do Docker para volumes
  
networks:
  midia-converte:
    driver: bridge
 


